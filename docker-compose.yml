# ERPilot AI - yerel calistirma
#
# Kullanim:
#   docker compose up --build
#   -> http://localhost:8000
#
# GEMINI_API_KEY ayni dizindeki .env dosyasindan otomatik okunur
# (yoksa bos kalir ve lokal fallback motoru devreye girer).

services:
  erpilot:
    build: .
    container_name: erpilot-ai
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DATA_SOURCE: csv
    restart: unless-stopped
